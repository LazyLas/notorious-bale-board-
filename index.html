<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notorious Bale — Lyric Analysis Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0e0d0c;--surface:#141312;--surface-2:#1a1917;--surface-3:#211f1d;
  --border:#2a2826;--border-2:#353230;
  --text:#e8e5e0;--text-2:#9a9690;--text-3:#5a5753;
  --accent:#c8a96e;--accent-hover:#d9be88;--accent-dim:#3d3120;
  --red:#c06060;--red-dim:#3d1f1f;
  --green:#6aaa72;--green-dim:#1d3d20;
  --blue:#6a9fd8;--blue-dim:#1d2f3d;
  --purple:#9a7dcf;--purple-dim:#2a1f3d;
  --orange:#d4834a;--orange-dim:#3d2210;
  --teal:#5aaba8;--teal-dim:#1a3330;
}
[data-theme="light"]{
  --bg:#f5f3ef;--surface:#faf9f6;--surface-2:#ffffff;--surface-3:#edeae4;
  --border:#ddd9d2;--border-2:#ccc8c0;
  --text:#1a1916;--text-2:#6a6660;--text-3:#aaa69f;
  --accent:#8a6930;--accent-hover:#a07d3a;--accent-dim:#f0e8d5;
  --red:#b84040;--red-dim:#fde8e8;
  --green:#3a8a42;--green-dim:#e4f5e6;
  --blue:#3a6faa;--blue-dim:#e0ecfa;
  --purple:#6a4daf;--purple-dim:#ede8fa;
  --orange:#b85a20;--orange-dim:#faeade;
  --teal:#2a8a88;--teal-dim:#e0f4f3;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{color:var(--accent)}
.logo-title{font-size:.95rem;font-weight:700;letter-spacing:-.02em}
.logo-sub{font-size:.68rem;color:var(--text-2);font-family:'Space Mono',monospace;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:5px 11px}
.search-wrap input{background:none;border:none;outline:none;font:inherit;font-size:.8rem;color:var(--text);width:150px}
.search-wrap input::placeholder{color:var(--text-3)}
.btn-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text-2);transition:all .15s}
.btn-icon:hover{border-color:var(--border-2);color:var(--text)}
.nav{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.nav-tab{padding:10px 15px;font-size:.75rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);border-bottom:2px solid transparent;transition:all .15s;cursor:pointer;white-space:nowrap}
.nav-tab:hover{color:var(--text-2)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content-area{flex:1;padding:20px 24px;display:none}
.content-area.active{display:block}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-head h2{font-size:1rem;font-weight:700}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:4px 11px;font-size:.68rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--border-2);border-radius:20px;color:var(--text-3);transition:all .15s}
.fb:hover{border-color:var(--accent);color:var(--accent)}
.fb.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:15px;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:var(--border-2);background:var(--surface-2);transform:translateY(-1px)}
.card.sel{border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent)}
.c-num{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--text-3);margin-bottom:5px}
.c-title{font-size:.85rem;font-weight:700;line-height:1.3;margin-bottom:7px}
.c-sum{font-size:.72rem;color:var(--text-2);line-height:1.5;margin-bottom:9px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 7px;border-radius:4px;font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge{position:absolute;top:10px;right:10px;font-size:.58rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:4px;background:var(--surface-3);color:var(--text-3)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;backdrop-filter:blur(3px)}
.overlay.open{display:flex;align-items:flex-start;justify-content:flex-end}
.panel{width:min(500px,96vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;position:relative}
.close-btn{position:absolute;top:16px;right:16px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:.9rem;transition:all .15s}
.close-btn:hover{background:var(--border);color:var(--text)}
.p-num{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--accent);margin-bottom:2px}
.p-title{font-size:1.2rem;font-weight:700;line-height:1.2;margin-bottom:3px}
.p-type{font-size:.65rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
.section-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:5px}
.p-sum{font-size:.85rem;color:var(--text-2);line-height:1.6}
.p-analysis{font-size:.8rem;color:var(--text);line-height:1.75;border-left:2px solid var(--accent-dim);padding-left:12px}
.key-lines{display:flex;flex-direction:column;gap:7px}
.kl{font-family:'Space Mono',monospace;font-size:.73rem;line-height:1.5;color:var(--accent);background:var(--accent-dim);padding:9px 12px;border-radius:6px;border-left:3px solid var(--accent)}
.conns{display:flex;flex-wrap:wrap;gap:7px}
.conn{padding:3px 9px;border-radius:6px;background:var(--surface-2);border:1px solid var(--border-2);font-size:.68rem;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s}
.conn:hover{border-color:var(--accent);color:var(--accent)}
.notes-ta{width:100%;min-height:72px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;font:inherit;font-size:.78rem;color:var(--text);resize:vertical;transition:border-color .15s;line-height:1.5}
.notes-ta:focus{outline:none;border-color:var(--border-2)}
.notes-ta::placeholder{color:var(--text-3)}
/* Tag colors */
.t-mask{background:var(--purple-dim);color:var(--purple)}
.t-sophia{background:var(--teal-dim);color:var(--teal)}
.t-survival{background:var(--green-dim);color:var(--green)}
.t-grief{background:var(--blue-dim);color:var(--blue)}
.t-suicide{background:var(--red-dim);color:var(--red)}
.t-music{background:var(--orange-dim);color:var(--orange)}
.t-love{background:var(--teal-dim);color:var(--teal)}
.t-humor{background:var(--accent-dim);color:var(--accent)}
.t-recovery{background:var(--green-dim);color:var(--green)}
.t-identity{background:var(--purple-dim);color:var(--purple)}
.t-loneliness{background:var(--blue-dim);color:var(--blue)}
.t-darkness{background:var(--red-dim);color:var(--red)}
.t-hope{background:var(--green-dim);color:var(--green)}
.t-friendship{background:var(--orange-dim);color:var(--orange)}
.t-loss{background:var(--blue-dim);color:var(--blue)}
.t-memory{background:var(--purple-dim);color:var(--purple)}
.t-philosophy{background:var(--accent-dim);color:var(--accent)}
.t-fear{background:var(--red-dim);color:var(--red)}
.t-acceptance{background:var(--green-dim);color:var(--green)}
.t-anger{background:var(--red-dim);color:var(--red)}
.t-courage{background:var(--orange-dim);color:var(--orange)}
.t-resolution{background:var(--green-dim);color:var(--green)}
.t-turning-point{background:var(--red-dim);color:var(--red)}
.t-closure{background:var(--teal-dim);color:var(--teal)}
.t-family{background:var(--blue-dim);color:var(--blue)}
.t-release{background:var(--teal-dim);color:var(--teal)}
.t-default{background:var(--surface-3);color:var(--text-2)}
/* Arcs */
.arcs-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.arc-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.arc-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.arc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.arc-n{font-size:.88rem;font-weight:700}
.arc-d{font-size:.74rem;color:var(--text-2);line-height:1.55;margin-bottom:12px}
.arc-bar{height:3px;background:var(--surface-3);border-radius:2px;overflow:hidden;margin-bottom:6px}
.arc-fill{height:100%;border-radius:2px}
.arc-meta{font-size:.64rem;color:var(--text-3);margin-bottom:10px}
.arc-chips{display:flex;flex-wrap:wrap;gap:5px}
.arc-chip{padding:3px 8px;border-radius:5px;font-size:.66rem;font-weight:600;cursor:pointer;transition:opacity .15s;border:1px solid transparent}
.arc-chip:hover{opacity:.75}
/* Symbols */
.sym-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.sym-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.sym-icon{font-size:1.4rem;margin-bottom:8px}
.sym-n{font-size:.85rem;font-weight:700;margin-bottom:5px}
.sym-d{font-size:.74rem;color:var(--text-2);line-height:1.55;margin-bottom:10px}
.sym-chips{display:flex;flex-wrap:wrap;gap:5px}
.sym-chip{padding:3px 8px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:4px;font-size:.64rem;color:var(--text-2);cursor:pointer;transition:all .15s}
.sym-chip:hover{border-color:var(--accent);color:var(--accent)}
/* Timeline */
.tl{display:flex;flex-direction:column;max-width:660px;margin:0 auto}
.tl-row{display:grid;grid-template-columns:60px 1fr;gap:14px;position:relative}
.tl-row::before{content:'';position:absolute;left:59px;top:22px;bottom:-8px;width:1px;background:var(--border)}
.tl-row:last-child::before{display:none}
.tl-n{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text-3);text-align:right;padding-top:16px}
.tl-dot{width:7px;height:7px;border-radius:50%;background:var(--border-2);position:absolute;left:57px;top:20px;border:1px solid var(--bg)}
.tl-body{padding:10px 0 18px}
.tl-t{font-size:.83rem;font-weight:700;cursor:pointer;color:var(--text);transition:color .15s;margin-bottom:3px}
.tl-t:hover{color:var(--accent)}
.tl-l{font-size:.7rem;color:var(--text-2);line-height:1.5}
.dot-turn{background:var(--accent)!important}
.dot-sophia{background:var(--teal)!important}
.dot-dark{background:var(--red)!important}
.dot-green{background:var(--green)!important}
@media(max-width:580px){
  .header{padding:10px 14px}
  .content-area{padding:14px}
  .nav{padding:0 14px;overflow-x:auto}
  .panel{width:100vw;height:100dvh}
  .grid{grid-template-columns:1fr}
  .search-wrap input{width:110px}
}
</style>
</head>

const NOTES={};
const TM={'mask':'Маска','sophia':'Sofya','survival':'Выживание','grief':'Горе','suicide':'Тёмная арка','music':'Музыка','love':'Любовь','humor':'Юмор','intro':'Интро','recovery':'Восстановление','identity':'Идентичность','loneliness':'Одиночество','darkness':'Тьма','hope':'Надежда','friendship':'Дружба','loss':'Потеря','memory':'Память','philosophy':'Философия','apathy':'Апатия','fear':'Страх','restraint':'Сдержанность','acceptance':'Принятие','anger':'Злость','release':'Освобождение','courage':'Смелость','resolution':'Развязка','turning-point':'Перелом','closure':'Финал','family':'Семья','self-awareness':'Самоосознание','relationships':'Отношения'};

function tc(t){return 't-'+(t in TM?t:'default');}
function tl(t){return TM[t]||t;}

function renderTracks(f='all',q=''){
  const g=document.getElementById('tgrid');
  const c=document.getElementById('cnt');
  const rows=T.filter(t=>{
    if(f!=='all'&&!t.themes.includes(f))return false;
    if(q){const qq=q.toLowerCase();return t.title.toLowerCase().includes(qq)||t.summary.toLowerCase().includes(qq)||t.analysis.toLowerCase().includes(qq);}
    return true;
  });
  c.textContent=`(${rows.length})`;
  g.innerHTML=rows.map(t=>`
    <div class="card" data-num="${t.num}" onclick="openD(${t.num})">
      ${t.type!=='track'?`<div class="badge">${t.type==='skit'?'Skit':t.type==='instrumental'?'Instr.':t.type}</div>`:''}
      <div class="c-num">T${String(t.num).padStart(2,'0')} · ${t.lang.toUpperCase()}</div>
      <div class="c-title">${t.title}</div>
      <div class="c-sum">${t.summary}</div>
      <div class="tags">${t.themes.map(x=>`<span class="tag ${tc(x)}">${tl(x)}</span>`).join('')}</div>
    </div>`).join('');
}

function openD(num){
  const t=T.find(x=>x.num===num);
  if(!t)return;
  const p=document.getElementById('pcontent');
  const conns=t.connections.map(n=>{
    const ct=T.find(x=>x.num===n);
    return ct?`<button class="conn" onclick="openD(${n})">→ ${n}. ${ct.title.length>22?ct.title.slice(0,22)+'…':ct.title}</button>`:'';
  }).join('');
  const typeMap={skit:'Skit / Intro',instrumental:'Instrumental 🎵',track:'Track',bilingual:'Bilingual Track',unknown:'?'};
  p.innerHTML=`
    <div class="p-num">ТРЕК ${String(t.num).padStart(2,'0')} · ${t.lang.toUpperCase()}</div>
    <div class="p-title">${t.title}</div>
    <div class="p-type">${typeMap[t.type]||t.type}</div>
    <div class="tags" style="margin-top:10px">${t.themes.map(x=>`<span class="tag ${tc(x)}">${tl(x)}</span>`).join('')}</div>
    <div><div class="section-lbl">Суть трека</div><div class="p-sum">${t.summary}</div></div>
    ${t.key_lines.length?`<div><div class="section-lbl">Ключевые строки</div><div class="key-lines">${t.key_lines.map(l=>`<div class="kl">${l}</div>`).join('')}</div></div>`:''}
    ${t.analysis&&t.analysis.length>20?`<div><div class="section-lbl">Анализ</div><div class="p-analysis">${t.analysis}</div></div>`:''}
    ${conns?`<div><div class="section-lbl">Связи</div><div class="conns">${conns}</div></div>`:''}
    <div><div class="section-lbl">Твои заметки</div><textarea class="notes-ta" id="na${num}" placeholder="Добавь своё…" oninput="NOTES[${num}]=this.value">${NOTES[num]||''}</textarea></div>
  `;
  document.getElementById('ov').classList.add('open');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  t.connections.forEach(n=>{const e=document.querySelector(`.card[data-num="${n}"]`);if(e)e.classList.add('sel');});
}

document.getElementById('closeBtn').onclick=()=>{
  document.getElementById('ov').classList.remove('open');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
};
document.getElementById('ov').addEventListener('click',e=>{
  if(e.target===document.getElementById('ov')){
    document.getElementById('ov').classList.remove('open');
    document.querySelectorAll('.card').forEach(c=>c.classList.remove('sel'));
  }
});

let cf='all',cq='';
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('.fb');if(!b)return;
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');cf=b.dataset.f;renderTracks(cf,cq);
});
document.getElementById('si').addEventListener('input',e=>{cq=e.target.value;renderTracks(cf,cq);});

function goTrack(n){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content-area').forEach(c=>c.classList.remove('active'));
  document.querySelector('[data-tab="tracks"]').classList.add('active');
  document.getElementById('tab-tracks').classList.add('active');
  setTimeout(()=>openD(n),80);
}

function renderArcs(){
  const g=document.getElementById('arcg');

    return `<div class="arc-card">
      <div class="arc-h"><div class="arc-dot" style="background:${a.color}"></div><div class="arc-n">${a.name}</div></div>
      <div class="arc-d">${a.desc}</div>
      <div class="arc-bar"><div class="arc-fill" style="width:${pct}%;background:${a.color}"></div></div>
      <div class="arc-meta">${a.tracks.length} треков · ${pct}%</div>
      <div class="arc-chips">${a.tracks.map(n=>{const t=T.find(x=>x.num===n);return t?`<button class="arc-chip" style="background:${a.color}22;border-color:${a.color}55;color:${a.color}" onclick="goTrack(${n})">${n}. ${t.title.length>16?t.title.slice(0,16)+'…':t.title}</button>`:''}).join('')}</div>

}
